project:
  type: website
  render:
    - "*.qmd"
  post-render: quarto/scripts/restoreMarkdownToHeirarchy.sh
  #resources:

website:
  title: "Python Programming with Design Patterns: Notes"
  page-navigation: true
  open-graph: true
  navbar:
    search: true
    left:
      - href: index.qmd
        text: Home
  sidebar:
    style: "docked"
    collapse-level: 1
    search: true
    contents:
      - section: "I: Introduction"
        contents:
          - I-introduction/chapter-01/chapter-01.qmd
          - I-introduction/chapter-02/chapter-02.qmd
          - I-introduction/chapter-03/chapter-03.qmd
          - I-introduction/chapter-04/chapter-04.qmd
      - section: II-Creational-Patterns/ii-creational-patterns.qmd
        contents:
          - II-Creational-Patterns/chapter-05/chapter-05.qmd

format:
  html:
    code-fold: false
    code-links:
      - repo
  gfm:
    filters:
      - quarto/scripts/strip_ansi.lua
toc: true
toc-depth: 6
format-links: false
execute:
  enabled: true
  error: true
engine: jupyter
